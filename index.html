<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory game</title>
    <!-- icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="icon" type="image/png" sizes="32x32" href="./images/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./images/icons/favicon-16x16.png">

    <link rel="apple-touch-icon" sizes="180x180" href="./images/icons/apple-touch-icon.png">
    
    <link rel="manifest" href="site.webmanifest">
    <!-- Styles -->
    <link rel="stylesheet" href="css/board.css">
    <link rel="stylesheet" href="css/main.css">
    <!-- Scripts -->
    <script src="scripts/card.js" defer></script>
    <script src="scripts/board.js" defer></script>
    <script src="scripts/main.js" defer></script>
</head>

<body>
    <!-- Templates -->
    <template id="cardTemplate">
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front"></div>
                <div class="flip-card-back"><img src="images/heros/card01.jpeg"></div>
            </div>
        </div>
    </template>
    <!-- Attempts -->
    <div id="attempts" class="hidden">
        Tentativas: <span id="attemptsValue">0</span>
    </div>
    <!-- Board -->
    <div id="board" class="hidden"></div>
    <!-- Menu -->
    <div id="menu">
        <h1>Memória do herói</h1>
        <div class="container">
            <select name="numCards" id="numCards"></select>
            <button id="start">start</button>
        </div>
    </div>
    <!-- Victory Screen -->
    <div id="victory" class="hidden">
        <h1>🎉 Você venceu! 🎉</h1>
        <button id="playAgain">Jogar Novamente</button>
    </div>
    <!-- Lose screen -->
    <div id="defeat" class="hidden">
        <h1>😢 Você perdeu!</h1>
        <button id="playAgainDefeat">Tentar Novamente</button>
    </div>
    <audio id="flipSound" src="sounds/card_flip.wav"></audio>
    <audio id="loseSound" src="sounds/lose-sound.mp3"></audio>
    <audio id="winSound" src="sounds/win-sound.mp3"></audio>
    <audio id="bgMusic" src="sounds/background-sound2.wav" loop></audio>
</body>

</html>
